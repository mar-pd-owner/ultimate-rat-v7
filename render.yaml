services:
  - type: web
    name: ultimate-rat-v7
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        value: 6454347745
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    autoDeploy: true
