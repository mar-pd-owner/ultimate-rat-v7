services:
  - type: web
    name: ultimate-rat-v9
    runtime: node
    buildCommand: npm install
    startCommand: node src/bot.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        value: 6454347745
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 10000
    plan: free
    autoDeploy: true
    healthCheckPath: /health
